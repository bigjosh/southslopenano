<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Mosaic inbox{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0a0a0a; }
    .accent { color: #00ffff; }
    .btn-cyan { background: #00ffff; color: #000; border: none; font-weight: 600; }
    .btn-cyan:hover, .btn-cyan:focus { background: #00ffff; color: #000; opacity: 0.9; }
    .msg-body { white-space: pre-wrap; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 0.875rem; }
    .msg-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 6px; }
    .small-mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 0.8125rem; color: var(--bs-secondary-color); }
    textarea.code-edit { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 0.9rem; min-height: 360px; }
  </style>
</head>
<body>
  <nav class="navbar bg-body-tertiary border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-semibold" href="/">Mosaic <span class="accent">inbox</span></a>
      <span class="navbar-text small-mono">{{ config_imap_user }}</span>
    </div>
  </nav>
  <main class="container py-4" style="max-width: 900px;">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="alert alert-info">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block body %}{% endblock %}
  </main>
</body>
</html>
